<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Manager</title>
  <meta name="description" content="Task management with scheduling and Windows desktop notifications" />
  <meta name="theme-color" content="#6366f1" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/icons/icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="/css/styles.css?v=2" />
</head>
<body>
<div id="app">

  <!-- ── Header ── -->
  <header class="header">
    <div class="header-content">
      <div class="logo">
        <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <path d="M9 12l2 2 4-4"/>
        </svg>
        <span>Task Manager</span>
      </div>
      <div class="header-actions">
        <button id="notif-btn" class="btn btn-secondary" title="Enable browser notifications">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
          Enable Alerts
        </button>
        <button id="add-task-btn" class="btn btn-primary">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          New Task
        </button>
      </div>
    </div>
  </header>

  <!-- ── Main ── -->
  <main class="main">

    <!-- Stats -->
    <div class="stats-bar">
      <div class="stat-card">
        <span class="stat-number" id="stat-total">0</span>
        <span class="stat-label">Total</span>
      </div>
      <div class="stat-card">
        <span class="stat-number stat-col-pending" id="stat-pending">0</span>
        <span class="stat-label">Pending</span>
      </div>
      <div class="stat-card">
        <span class="stat-number stat-col-overdue" id="stat-overdue">0</span>
        <span class="stat-label">Overdue</span>
      </div>
      <div class="stat-card">
        <span class="stat-number stat-col-done" id="stat-done">0</span>
        <span class="stat-label">Done</span>
      </div>
    </div>

    <!-- Filter Tabs -->
    <div class="filter-tabs" role="tablist">
      <button class="filter-tab active" data-filter="all"     role="tab">All</button>
      <button class="filter-tab"         data-filter="pending" role="tab">Pending</button>
      <button class="filter-tab"         data-filter="overdue" role="tab">Overdue</button>
      <button class="filter-tab"         data-filter="done"    role="tab">Done</button>
    </div>

    <!-- Task Grid -->
    <div id="task-grid" class="task-grid">
      <div class="empty-state" id="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <path d="M9 12l2 2 4-4"/>
        </svg>
        <h3>No tasks here</h3>
        <p>Create your first task to get started</p>
        <button class="btn btn-primary" id="empty-add-btn">Create Task</button>
      </div>
    </div>

  </main>
</div>

<!-- ── Create / Edit Modal ── -->
<div id="task-modal" class="modal-overlay" hidden aria-modal="true" role="dialog">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-title">New Task</h2>
      <button class="modal-close" id="modal-close-btn" aria-label="Close">&times;</button>
    </div>
    <form id="task-form">
      <div class="form-body">

        <div class="form-group">
          <label for="task-title">Title <span class="required">*</span></label>
          <input type="text" id="task-title" name="title" placeholder="Task title…"
                 maxlength="200" required autocomplete="off" />
        </div>

        <div class="form-group">
          <label for="task-description">Description</label>
          <textarea id="task-description" name="description"
                    placeholder="Detailed notes…" maxlength="2000" rows="4"></textarea>
        </div>

        <div class="form-group">
          <label for="task-scheduled">Scheduled Date &amp; Time</label>
          <input type="datetime-local" id="task-scheduled" name="scheduledAt" />
        </div>

        <div class="form-group">
          <label>Image Attachment</label>
          <div class="image-upload-area" id="image-upload-area" tabindex="0" role="button"
               aria-label="Upload image">
            <div class="image-preview" id="image-preview" hidden>
              <img id="preview-img" src="" alt="Preview" />
              <button type="button" class="remove-image-btn" id="remove-image-btn"
                      aria-label="Remove image">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                  <line x1="18" y1="6" x2="6" y2="18"/>
                  <line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
              </button>
            </div>
            <div class="upload-placeholder" id="upload-placeholder">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
                <polyline points="17 8 12 3 7 8"/>
                <line x1="12" y1="3" x2="12" y2="15"/>
              </svg>
              <span>Click or drag an image here</span>
              <span class="upload-hint">PNG · JPG · WEBP · GIF — max 5 MB</span>
            </div>
            <input type="file" id="task-image" name="image" accept="image/*" hidden />
          </div>
        </div>

      </div><!-- /form-body -->
      <div class="modal-footer">
        <button type="button" class="btn btn-ghost" id="cancel-btn">Cancel</button>
        <button type="submit" class="btn btn-primary" id="submit-btn">Create Task</button>
      </div>
    </form>
  </div>
</div>

<!-- ── Detail Modal ── -->
<div id="detail-modal" class="modal-overlay" hidden aria-modal="true" role="dialog">
  <div class="modal modal-large">
    <div class="modal-header">
      <h2 id="detail-title"></h2>
      <button class="modal-close" id="detail-close-btn" aria-label="Close">&times;</button>
    </div>
    <div id="detail-content" class="detail-content"></div>
    <div class="modal-footer" id="detail-footer"></div>
  </div>
</div>

<!-- ── Toast container ── -->
<div id="toast-container" class="toast-container" aria-live="polite"></div>

<script src="/js/api.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
